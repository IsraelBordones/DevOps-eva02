name: Deploy Application to AWS EC2

on:
  push:
    branches:
      - feature/pipeline   # Se dispara automáticamente cuando subes cambios a esta rama

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio en el servidor de GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Iniciar sesión en Docker Hub usando tus secretos (Corregido el formato de espacios)
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Construir y subir la imagen del Backend
    - name: Build and Push Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        docker push ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest

    # 4. Construir y subir la imagen del Frontend
    - name: Build and Push Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest ./front_despacho
        docker push ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest

    # 5. Conectarse a la máquina EC2 por SSH y hacer el Auto-Deploy
    - name: SSH Remote Commands to Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_INSTANCE_IP }}
        username: ec2-user
        key: ${{ secrets.SSH_KEY }}
        script: |
          # Detener lo que esté corriendo viejo (si aplica)
          docker stop back-app front-app || true
          docker rm back-app front-app || true
          
          # Descargar las imágenes nuevas que acabamos de subir a Docker Hub
          docker pull ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest
          
          # Volver a levantar los contenedores actualizados
          docker run -d --name back-app -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest
          docker run -d --name front-app -p 8082:8082 ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest