```yaml id="1q57ku"
name: CI/CD Proyecto DevOps

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # ============================================
    # CLONAR REPOSITORIO
    # ============================================
    - name: Checkout repository
      uses: actions/checkout@v4

    # ============================================
    # CONFIGURAR CREDENCIALES AWS
    # ============================================
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    # ============================================
    # CONFIGURAR DOCKER BUILDX
    # ============================================
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ============================================
    # LOGIN DOCKER HUB
    # ============================================
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # ============================================
    # BUILD + PUSH BACK VENTAS
    # ============================================
    - name: Build and Push back-ventas
      uses: docker/build-push-action@v5
      with:
        context: ./back-Ventas_SpringBoot/Springboot-API-REST
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest

    # ============================================
    # BUILD + PUSH BACK DESPACHOS
    # ============================================
    - name: Build and Push back-despachos
      uses: docker/build-push-action@v5
      with:
        context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/back-despachos:latest

    # ============================================
    # BUILD + PUSH FRONT DESPACHO
    # ============================================
    - name: Build and Push front-despacho
      uses: docker/build-push-action@v5
      with:
        context: ./front_despacho
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/front-despacho:latest

    # ============================================
    # DEPLOY AUTOMÁTICO EN EC2
    # ============================================
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: ${{ secrets.EC2_PORT }}

        script: |

          echo "Entrando al directorio app..."
          cd ~/app

          echo "Actualizando imágenes..."
          docker compose pull

          echo "Deteniendo contenedores antiguos..."
          docker compose down

          echo "Levantando nueva versión..."
          docker compose up -d

          echo "Limpiando imágenes antiguas..."
          docker image prune -af

          echo "Deploy completado correctamente."
```
